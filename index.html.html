<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星凱堤岸 - 物業追蹤唯讀系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen pb-12">

    <header class="bg-slate-800 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold tracking-wide flex items-center gap-2">
                    🏢 星凱堤岸 - 最新跟進狀況 (唯讀)
                </h1>
                <p class="text-xs text-slate-400 mt-0.5" id="updateTimeStatus">正在從伺服器載入最新數據...</p>
            </div>
            <div id="loadingBadge" class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs font-semibold animate-pulse">
                🔄 同步中...
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-6">
        <section class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-col md:flex-row gap-4 justify-between items-center">
            <div class="w-full md:w-96">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">自由關鍵字搜尋 (輸入座/樓/室/備忘/日期)</label>
                <input type="text" id="searchBar" placeholder="搜尋：5座、暫時唔賣、2026-06..." 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div class="w-full md:w-auto flex flex-col items-start md:items-end gap-1">
                <span class="text-xs font-bold text-gray-400 uppercase">狀態快速篩選</span>
                <div class="flex flex-wrap gap-2">
                    <button onclick="filterData('all')" class="filter-btn bg-slate-800 text-white px-3 py-1.5 rounded-full text-xs font-semibold">全部單位</button>
                    <button onclick="filterData('uncontacted')" class="filter-btn bg-gray-100 text-gray-600 px-3 py-1.5 rounded-full text-xs font-semibold hover:bg-gray-200">最新狀態為未聯絡 (N)</button>
                    <button onclick="filterData('contacted')" class="filter-btn bg-gray-100 text-gray-600 px-3 py-1.5 rounded-full text-xs font-semibold hover:bg-gray-200">最新狀態為已聯絡 (Y)</button>
                </div>
            </div>
        </section>

        <div id="statsSummary" class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-6 hidden">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-slate-500">
                <p class="text-xs text-gray-500 font-medium">獨立單位總數</p>
                <p id="totalCount" class="text-xl font-bold mt-1">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-xs text-gray-500 font-medium">最新成功聯絡 (Y)</p>
                <p id="contactedCount" class="text-xl font-bold mt-1">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-amber-500">
                <p class="text-xs text-gray-500 font-medium">總聯絡紀錄筆數</p>
                <p id="totalRecordsCount" class="text-xl font-bold mt-1">0</p>
            </div>
        </div>

        <div id="errorState" class="bg-red-50 text-red-700 rounded-xl p-8 text-center shadow-sm border border-red-200 hidden">
            <p class="font-bold text-lg">⚠️ 未能載入數據檔</p>
            <p class="text-sm mt-1">請確保您已將名為 <code class="bg-red-100 px-1 rounded font-mono">data.csv</code> 的資料檔上傳至與此網頁相同的 GitHub 倉庫內。</p>
        </div>

        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        let rawRecords = [];
        let currentFilter = 'all';

        // 核心設定：網頁會自動去抓取同一個網址目錄下的 data.csv 檔案
        // 加上快取破壞參數 (?t=...) 確保每次開啟都是抓最新上傳的，不會被瀏覽器舊快取卡住
        const csvUrl = `./data.csv?t=${new Date().getTime()}`;

        window.addEventListener('DOMContentLoaded', () => {
            fetchCSVData();
        });

        // 自動異步抓取 GitHub 上的 CSV 檔案
        function fetchCSVData() {
            fetch(csvUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                })
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            rawRecords = results.data.map(item => {
                                return {
                                    date: item['日期'] || item['date'] || '2026-06-23', // 根據上傳資料設定預設日期
                                    block: (item['座'] || '').trim(),
                                    floor: (item['樓'] || '').trim(),
                                    room: (item['室'] || '').trim(),
                                    sold: (item['已售'] || '').trim().toUpperCase(),
                                    contacted: (item['成功聯絡'] || '').trim().toUpperCase(),
                                    remark: item['Remark'] || item['remark'] || ''
                                };
                            }).filter(item => item.block && item.floor && item.room);

                            // 隱藏加載動畫，初始化畫面
                            document.getElementById('loadingBadge').classList.add('hidden');
                            document.getElementById('updateTimeStatus').innerText = `數據同步成功！已載入最新即時狀況`;
                            
                            initSystemView();
                        }
                    });
                })
                .catch(error => {
                    console.error('Error fetching CSV:', error);
                    document.getElementById('loadingBadge').classList.add('hidden');
                    document.getElementById('errorState').classList.remove('hidden');
                    document.getElementById('updateTimeStatus').innerText = `數據同步失敗，請聯絡管理員更新 data.csv`;
                });
        }

        function initSystemView() {
            document.getElementById('statsSummary').classList.remove('hidden');
            updateStats();
            renderCards();
        }

        // 依據物業單位歸納合併歷史
        function groupRecordsByProperty() {
            const groups = {};
            rawRecords.forEach(rec => {
                const key = `${rec.block}-${rec.floor}-${rec.room}`;
                if (!groups[key]) {
                    groups[key] = {
                        block: rec.block,
                        floor: rec.floor,
                        room: rec.room,
                        history: []
                    };
                }
                groups[key].history.push(rec);
            });

            Object.keys(groups).forEach(key => {
                groups[key].history.sort((a, b) => new Date(b.date) - new Date(a.date));
                groups[key].latestStatus = groups[key].history[0];
            });

            return Object.values(groups);
        }

        // 渲染卡片 (移除所有輸入/Checkbox控制，改為純展示)
        function renderCards() {
            const container = document.getElementById('cardsContainer');
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            container.innerHTML = '';

            const properties = groupRecordsByProperty();

            let filteredProperties = properties.filter(prop => {
                const latest = prop.latestStatus;
                
                if (currentFilter === 'uncontacted' && latest.contacted !== 'N') return false;
                if (currentFilter === 'contacted' && latest.contacted !== 'Y') return false;

                if (searchTerm) {
                    const matchBasic = 
                        prop.block.toLowerCase().includes(searchTerm) ||
                        prop.floor.toLowerCase().includes(searchTerm) ||
                        prop.room.toLowerCase().includes(searchTerm);
                    
                    const matchHistory = prop.history.some(h => 
                        h.remark.toLowerCase().includes(searchTerm) || 
                        h.date.toLowerCase().includes(searchTerm) ||
                        h.contacted.toLowerCase() === searchTerm ||
                        h.sold.toLowerCase() === searchTerm
                    );

                    return matchBasic || matchHistory;
                }
                return true;
            });

            if (filteredProperties.length === 0 && rawRecords.length > 0) {
                container.innerHTML = `<p class="col-span-full text-center text-gray-400 py-12">找不到符合關鍵字的物業資料</p>`;
                return;
            }

            filteredProperties.forEach(prop => {
                const latest = prop.latestStatus;
                const card = document.createElement('div');
                
                const borderClass = latest.contacted === 'Y' ? 'border-l-4 border-l-emerald-500' : 'border-l-4 border-l-amber-500';
                card.className = `bg-white p-5 rounded-xl shadow-xs border border-gray-100 flex flex-col justify-between ${borderClass}`;

                let historyHtml = '';
                prop.history.forEach((h, idx) => {
                    historyHtml += `
                        <div class="text-xs text-gray-600 bg-slate-50 p-2 rounded border border-gray-100 ${idx === 0 ? 'ring-1 ring-blue-400 bg-blue-50/40' : ''}">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-gray-500">${h.date}</span>
                                <div class="flex gap-1">
                                    <span class="px-1.5 py-0.5 rounded text-[10px] ${h.contacted === 'Y' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'}">
                                        聯絡:${h.contacted}
                                    </span>
                                    ${h.sold === 'Y' ? '<span class="px-1.5 py-0.5 rounded text-[10px] bg-rose-100 text-rose-800">已售</span>' : ''}
                                </div>
                            </div>
                            <p class="text-gray-700 italic">${h.remark || '（無備忘）'}</p>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center pb-2 border-b border-gray-100 mb-3">
                            <span class="text-base font-bold text-slate-800">
                                ${prop.block}座 ${prop.floor}樓 ${prop.room}室
                            </span>
                            <span class="text-xs font-semibold px-2 py-0.5 rounded ${latest.contacted === 'Y' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">
                                狀態: ${latest.contacted === 'Y' ? '成功聯絡' : '未成功'}
                            </span>
                        </div>

                        <div class="mt-2">
                            <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">📜 歷史紀錄與備忘</label>
                            <div class="space-y-2 max-h-64 overflow-y-auto pr-1">
                                ${historyHtml}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateStats() {
            const properties = groupRecordsByProperty();
            document.getElementById('totalCount').innerText = properties.length;
            document.getElementById('contactedCount').innerText = properties.filter(p => p.latestStatus.contacted === 'Y').length;
            document.getElementById('totalRecordsCount').innerText = rawRecords.length;
        }

        function filterData(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
            });
            event.target.classList.remove('bg-gray-100', 'text-gray-600', 'hover:bg-gray-200');
            event.target.classList.add('bg-slate-800', 'text-white');
            renderCards();
        }

        document.getElementById('searchBar').addEventListener('input', renderCards);
    </script>
</body>
</html>
